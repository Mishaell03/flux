services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 20s
      retries: 5

  migrate:
    image: flyway/flyway:latest
    command:
      - -url=jdbc:postgresql://postgres:5432/flux_db
      - -user=${POSTGRES_USER}
      - -password=${POSTGRES_PASSWORD}
      - -locations=filesystem:/flyway/migrations,filesystem:/flyway/seeds
      - migrate
    volumes:
      - ./infra/postgres/flux_db/migrations:/flyway/migrations:ro
      - ./infra/postgres/flux_db/seeds:/flyway/seeds:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flux_db
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
      IMAGE_BASE_ENDPOINT: ${IMAGE_BASE_ENDPOINT:-}
      SECRET: ${SECRET:-change-me}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-}
      YANDEX_REDIRECT_WEB: ${YANDEX_REDIRECT_WEB:-}
      YANDEX_REDIRECT_MOBILE: ${YANDEX_REDIRECT_MOBILE:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["admin"]

volumes:
  postgres_data:
