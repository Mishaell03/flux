services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 5s
      timeout: 20s
      retries: 5

  migrate:
    image: flyway/flyway:latest
    command:
      - -url=jdbc:postgresql://postgres:5432/flux_db
      - -user=${POSTGRES_USER}
      - -password=${POSTGRES_PASSWORD}
      - -locations=filesystem:/flyway/migrations,filesystem:/flyway/seeds
      - migrate
    volumes:
      - ./infra/postgres/flux_db/migrations:/flyway/migrations:ro
      - ./infra/postgres/flux_db/seeds:/flyway/seeds:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./service
    restart: unless-stopped
    env_file:
      - ./service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./service/assets:/app/assets
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  n8n-import:
    image: n8nio/n8n:latest
    restart: "no"
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        n8n import:workflow --input=/workflows/flux-reminder.json
        n8n publish:workflow --id=3HR88t5WzPJGz11ocwmZM
        n8n list:workflow
    depends_on:
      - api

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-import:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [ "dev" ]

volumes:
  postgres_data:
  n8n_data: